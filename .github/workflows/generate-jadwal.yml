name: Generate Jadwal Sholat Bulanan

on:
  schedule:
    # Jalan tiap tanggal 25 jam 22:00 WIB (15:00 UTC) -> generate jadwal bulan depan
    - cron: "0 15 25 * *"
  workflow_dispatch: {}   # tombol "Run workflow" manual di tab Actions, buat testing

# Cegah 2 run jalan barengan (misal manual run + jadwal cron bersamaan,
# atau double-klik "Run workflow") - ini penyebab paling umum push ke git ketolak.
concurrency:
  group: generate-jadwal
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LibreOffice & poppler (untuk konversi docx -> jpg)
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Install font Archivo Black (font tebal/"black" pengganti Segoe UI Black)
        run: |
          mkdir -p ~/.fonts
          curl -sL -o ~/.fonts/ArchivoBlack-Regular.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/archivoblack/ArchivoBlack-Regular.ttf"
          fc-cache -f ~/.fonts

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate jadwal sholat bulan depan (+ kirim Telegram/WhatsApp kalau secret diset)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
          WA_TARGET: ${{ secrets.WA_TARGET }}
        run: python main.py

      - name: Commit hasil ke repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.jpg output/*.docx
          git diff --staged --quiet && echo "Tidak ada perubahan, lewati commit." && exit 0
          git commit -m "Auto-generate jadwal sholat bulan depan"
          # Kalau ada perubahan lain di remote (misal run sebelumnya baru saja push),
          # tarik dulu & rebase commit kita di atasnya, baru push. Retry beberapa kali
          # kalau race condition-nya kebetulan kejadian pas bersamaan.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push gagal (percobaan $i), coba lagi dalam 5 detik..."
            sleep 5
          done

      - name: Upload sebagai artifact (backup, bisa didownload dari tab Actions)
        uses: actions/upload-artifact@v4
        with:
          name: jadwal-sholat
          path: |
            output/*.jpg
            output/*.docx

      # --- Opsional: kirim email otomatis dengan file docx terlampir ---
      # Uncomment blok ini kalau mau dikirim email juga. Perlu 4 secrets:
      # EMAIL_USERNAME, EMAIL_PASSWORD (App Password Gmail), EMAIL_TO
      #
      # - name: Kirim email
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.EMAIL_USERNAME }}
      #     password: ${{ secrets.EMAIL_PASSWORD }}
      #     subject: "Jadwal Sholat Bulan Depan Sudah Terbit"
      #     to: ${{ secrets.EMAIL_TO }}
      #     from: Jadwal Sholat Bot
      #     body: "Terlampir jadwal sholat untuk bulan depan."
      #     attachments: output/*.docx
